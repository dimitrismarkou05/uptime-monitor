name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      venv-cache-key: ${{ steps.venv-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute venv cache key
        id: venv-key
        run: |
          KEY="${{ runner.os }}-venv-${{ hashFiles('backend/pyproject.toml', 'backend/setup.py', 'backend/setup.cfg', 'backend/requirements*.txt') }}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Cache venv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: backend/.venv
          key: ${{ steps.venv-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Create venv and install
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.build-key.outputs.key }}
      playwright-cache-key: ${{ steps.pw-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Compute build cache key
        id: build-key
        run: |
          KEY="${{ runner.os }}-frontend-build-${{ hashFiles('frontend/package-lock.json', 'frontend/**/*.ts', 'frontend/**/*.tsx', 'frontend/**/*.js', 'frontend/**/*.jsx') }}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: frontend/dist
          key: ${{ steps.build-key.outputs.key }}

      - name: Build frontend
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: "https://mock-url.supabase.co"
          VITE_SUPABASE_ANON_KEY: "mock-key-1234567890"
        run: npm run build

      - name: Compute Playwright cache key
        id: pw-key
        run: |
          KEY="${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.pw-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

  backend:
    runs-on: ubuntu-latest
    needs: build-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore venv
        uses: actions/cache/restore@v4
        with:
          path: backend/.venv
          key: ${{ needs.build-backend.outputs.venv-cache-key }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
        run: .venv/bin/alembic upgrade head

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: .venv/bin/pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  frontend-unit:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run unit tests
        working-directory: ./frontend
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      # ── Backend (restore venv, no reinstall) ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore venv
        uses: actions/cache/restore@v4
        with:
          path: backend/.venv
          key: ${{ needs.build-backend.outputs.venv-cache-key }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
        run: .venv/bin/alembic upgrade head

      - name: Start backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          FROM_EMAIL: test@localhost
        run: |
          .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done || (echo "Backend failed to start" && exit 1)

      # ── Frontend (restore build + playwright, no rebuild) ──
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: frontend/dist
          key: ${{ needs.build-frontend.outputs.build-cache-key }}

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ needs.build-frontend.outputs.playwright-cache-key }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Start preview server
        working-directory: ./frontend
        run: |
          npx vite preview --port 5173 --host 0.0.0.0 &
          npx --yes wait-on http://localhost:5173 --timeout 30000

      - name: Run e2e
        working-directory: ./frontend
        run: npx playwright test --reporter=list,html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop services
        if: always()
        run: |
          pkill -f "uvicorn" || true
          pkill -f "vite preview" || true

  publish-reports:
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit, frontend-e2e]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: _site/backend-coverage

      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: _site/frontend-coverage

      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: _site/playwright

      - run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Uptime Monitor Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              h1 { font-size: 24px; margin-bottom: 32px; }
              a { display: block; padding: 16px 20px; margin-bottom: 12px; background: #f3f4f6; border-radius: 8px; text-decoration: none; color: #111; font-weight: 500; }
              a:hover { background: #e5e7eb; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <a href="backend-coverage/index.html">Backend Coverage Report</a>
            <a href="frontend-coverage/index.html">Frontend Coverage Report</a>
            <a href="playwright/index.html">Playwright E2E Report</a>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
