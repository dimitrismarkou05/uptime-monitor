name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── TRACK 1: Backend Unit Tests ──
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready --health-interval 2s --health-timeout 5s --health-retries 10
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 2s --health-timeout 5s --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Create venv with uv
        working-directory: ./backend
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Run tests & migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          .venv/bin/alembic upgrade head
          .venv/bin/pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

  # ── TRACK 2: Frontend Unit Tests ──
  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & test
        working-directory: ./frontend
        run: |
          npm ci
          npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── TRACK 3: Frontend E2E (Full Stack) ──
  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready --health-interval 2s --health-timeout 5s --health-retries 10
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 2s --health-timeout 5s --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
        run: .venv/bin/alembic upgrade head

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: "https://mock-url.supabase.co"
          VITE_SUPABASE_ANON_KEY: "mock-key-1234567890"
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Start stack & Run E2E
        working-directory: ./frontend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          FROM_EMAIL: test@localhost
          SUPABASE_URL: "https://mock-url.supabase.co"
          SUPABASE_SERVICE_KEY: "mock-key-1234567890"
        run: |
          (cd ../backend && .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 &)
          (npx vite preview --port 5173 --host 0.0.0.0 &)

          npx --yes wait-on http-get://localhost:8000/health http://localhost:5173 -i 250 --timeout 30000

          npx playwright test --reporter=list,html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── PUBLISH ──
  publish-reports:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit, frontend-e2e]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: _site/backend-coverage

      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: _site/frontend-coverage

      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: _site/playwright

      - run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Uptime Monitor Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              h1 { font-size: 24px; margin-bottom: 32px; }
              a { display: block; padding: 16px 20px; margin-bottom: 12px; background: #f3f4f6; border-radius: 8px; text-decoration: none; color: #111; font-weight: 500; }
              a:hover { background: #e5e7eb; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <a href="backend-coverage/index.html">Backend Coverage Report</a>
            <a href="frontend-coverage/index.html">Frontend Coverage Report</a>
            <a href="playwright/index.html">Playwright E2E Report</a>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
