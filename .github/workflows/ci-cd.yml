name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend unit tests with coverage
        working-directory: ./frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uptime
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Start backend API
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uptime
          SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/uptime
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          FROM_EMAIL: test@localhost
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "API_PID=$!" >> $GITHUB_ENV
          sleep 5
          curl -f http://localhost:8000/health || exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: "https://mock-url.supabase.co"
          VITE_SUPABASE_ANON_KEY: "mock-key-1234567890"
        run: npm run build

      - name: Start frontend preview server
        working-directory: ./frontend
        run: |
          npx vite preview --port 5173 --host 0.0.0.0 &
          echo "FE_PID=$!" >> $GITHUB_ENV
          npx --yes wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop backend
        if: always()
        run: kill $API_PID || true

      - name: Stop frontend
        if: always()
        run: kill $FE_PID || true

  publish-reports:
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit, frontend-e2e]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: _site/backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: _site/frontend-coverage

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: _site/playwright

      - name: Create index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Uptime Monitor Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              h1 { font-size: 24px; margin-bottom: 32px; }
              a { display: block; padding: 16px 20px; margin-bottom: 12px; background: #f3f4f6; border-radius: 8px; text-decoration: none; color: #111; font-weight: 500; }
              a:hover { background: #e5e7eb; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <a href="backend-coverage/index.html">Backend Coverage Report</a>
            <a href="frontend-coverage/index.html">Frontend Coverage Report</a>
            <a href="playwright/index.html">Playwright E2E Report</a>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
