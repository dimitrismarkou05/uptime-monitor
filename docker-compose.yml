services:
  db:
    image: postgres:16-alpine
    container_name: uptime-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uptime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uptime-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: uptime-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI to view captured emails
      - "1025:1025"  # SMTP server
    volumes:
      - mailpit_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/uptime
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/uptime
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FROM_EMAIL: alerts@uptime-monitor.local
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/uptime
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/uptime
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FROM_EMAIL: alerts@uptime-monitor.local
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app
    command: celery -A celery_worker worker -l info

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/uptime
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/uptime
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_beat beat -l info

volumes:
  postgres_data:
  redis_data:
  mailpit_data: